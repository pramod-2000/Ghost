name: ghost-production

services:
  ghost:
    image: ${IMAGE_REPOSITORY:-ghcr.io/pramod-2000/ghost-custom}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${GHOST_PORT:-80}:2368"
    environment:
      NODE_ENV: production
      url: ${GHOST_URL}
      server__host: 0.0.0.0
      server__port: 2368
      database__client: mysql
      database__connection__host: mysql
      database__connection__user: ghost
      database__connection__password: ${MYSQL_PASSWORD}
      database__connection__database: ghost
    volumes:
      - ghost-content:/home/ghost/content
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:2368/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks: [app, monitoring]

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ghost
      MYSQL_USER: ghost
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    command: ["mysqld", "--mysql-native-password=ON"]
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [app, monitoring]

  prometheus:
    image: prom/prometheus:v3.4.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on: [blackbox-exporter, node-exporter, cadvisor, mysql-exporter]
    networks: [monitoring]

  grafana:
    image: grafana/grafana:12.0.2
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${MONITORING_BIND_ADDRESS:-127.0.0.1}:3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on: [prometheus]
    networks: [monitoring]

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.27.0
    restart: unless-stopped
    volumes:
      - ./monitoring/blackbox/blackbox.yml:/config/blackbox.yml:ro
    command: ["--config.file=/config/blackbox.yml"]
    networks: [monitoring]

  node-exporter:
    image: prom/node-exporter:v1.9.1
    restart: unless-stopped
    command: ["--path.rootfs=/host"]
    volumes:
      - /:/host:ro,rslave
    networks: [monitoring]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks: [monitoring]

  mysql-exporter:
    image: prom/mysqld-exporter:v0.15.1
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: root:${MYSQL_ROOT_PASSWORD}@(mysql:3306)/
    depends_on:
      mysql:
        condition: service_healthy
    networks: [monitoring]

volumes:
  ghost-content:
  mysql-data:
  prometheus-data:
  grafana-data:

networks:
  app:
  monitoring:
