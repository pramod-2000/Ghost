name: Production security, build and deploy

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write

env:
  NODE_VERSION: 22.18.0
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'ghost-custom' }}

jobs:
  trivy:
    name: Trivy repository scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - name: Scan source and dependencies
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8 # v0.33.1
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '1'

      - name: Upload results to GitHub Security
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true # Upload requires GitHub Advanced Security on private repositories
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          sarif_file: trivy-results.sarif

  build:
    name: Build and push Docker image
    if: github.event_name != 'pull_request'
    needs: trivy
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Ghost and standalone Docker context
        run: |
          PKG_VERSION=$(node -p "require('./ghost/core/package.json').version")
          echo "GHOST_BUILD_VERSION=${PKG_VERSION}+${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          pnpm build:production
          pnpm --filter ghost archive
          mv ghost/core/package /tmp/ghost-production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image coordinates
        id: image
        run: |
          OWNER=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          NAME=$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/${NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable and latest tags
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: /tmp/ghost-production
          file: ${{ github.workspace }}/Dockerfile.production
          target: full
          push: true
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            GHOST_BUILD_VERSION=${{ env.GHOST_BUILD_VERSION }}
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2 and health check
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout deployment files
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure SSH
        env:
          # Paste the complete .pem file contents into this GitHub secret.
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ vars.EC2_HOST }}
        run: |
          : "${EC2_HOST:?Set the EC2_HOST repository variable}"
          : "${EC2_SSH_PRIVATE_KEY:?Set the EC2_SSH_PRIVATE_KEY repository secret}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          {
            echo 'Host *'
            echo '  IdentityFile ~/.ssh/deploy_key'
            echo '  IdentitiesOnly yes'
            echo '  BatchMode yes'
            echo '  StrictHostKeyChecking yes'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Create protected production environment file
        env:
          IMAGE_REPOSITORY: ${{ needs.build.outputs.image }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          GHOST_URL: ${{ secrets.GHOST_URL }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
        run: |
          umask 077
          {
            printf 'IMAGE_REPOSITORY=%s\n' "$IMAGE_REPOSITORY"
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
            printf 'GHOST_URL=%s\n' "$GHOST_URL"
            printf 'GHOST_PORT=80\n'
            printf 'MYSQL_ROOT_PASSWORD=%s\n' "$MYSQL_ROOT_PASSWORD"
            printf 'MYSQL_PASSWORD=%s\n' "$MYSQL_PASSWORD"
            printf 'GRAFANA_ADMIN_PASSWORD=%s\n' "$GRAFANA_ADMIN_PASSWORD"
            printf 'MONITORING_BIND_ADDRESS=127.0.0.1\n'
            printf 'PROMETHEUS_RETENTION=15d\n'
          } > production.env

      - name: Bootstrap EC2 and upload deployment bundle
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" 'bash -s' < scripts/deploy/bootstrap-ec2.sh
          tar czf deployment.tgz compose.production.yaml monitoring
          scp deployment.tgz production.env "$EC2_USER@$EC2_HOST:/tmp/"
          ssh "$EC2_USER@$EC2_HOST" 'set -e; tar xzf /tmp/deployment.tgz -C /opt/ghost; install -m 600 /tmp/production.env /opt/ghost/.env; rm -f /tmp/deployment.tgz /tmp/production.env'

      - name: Pull and deploy
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh "$EC2_USER@$EC2_HOST" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          ssh "$EC2_USER@$EC2_HOST" 'cd /opt/ghost && docker compose -f compose.production.yaml pull && docker compose -f compose.production.yaml up -d --remove-orphans && docker image prune -f'

      - name: Health check
        env:
          EC2_HOST: ${{ vars.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" 'for attempt in $(seq 1 30); do status=$(docker inspect --format="{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}" ghost-production-ghost-1 2>/dev/null || true); if [ "$status" = healthy ]; then curl -fsS http://127.0.0.1/ >/dev/null && exit 0; fi; sleep 10; done; cd /opt/ghost; docker compose -f compose.production.yaml ps; docker compose -f compose.production.yaml logs --tail=150 ghost; exit 1'

      - name: Deployment summary
        if: always()
        env:
          GHOST_URL: ${{ secrets.GHOST_URL }}
          IMAGE: ${{ needs.build.outputs.image }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          {
            echo '## Production deployment'
            echo "- Result: **${{ job.status }}**"
            echo "- Image: \`${IMAGE}:${IMAGE_TAG}\`"
            echo "- Application: ${GHOST_URL}"
            echo '- Grafana: private on EC2 port 3000 (use an SSH tunnel)'
            echo '- Prometheus: private on EC2 port 9090 (use an SSH tunnel)'
          } >> "$GITHUB_STEP_SUMMARY"
