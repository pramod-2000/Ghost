name: Production build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  NODE_VERSION: 22.18.0
  IMAGE_NAME: ${{ vars.IMAGE_NAME || 'ghost-custom' }}

jobs:
  build:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      tag: ${{ steps.image.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Ghost and standalone Docker context
        run: |
          PKG_VERSION=$(node -p "require('./ghost/core/package.json').version")
          echo "GHOST_BUILD_VERSION=${PKG_VERSION}+${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          pnpm build:production
          pnpm --filter ghost archive
          mv ghost/core/package /tmp/ghost-production

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image coordinates
        id: image
        run: |
          OWNER=$(printf '%s' "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          NAME=$(printf '%s' "$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/${NAME}" >> "$GITHUB_OUTPUT"
          echo "tag=sha-${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build and push immutable and latest tags
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: /tmp/ghost-production
          file: ${{ github.workspace }}/Dockerfile.production
          target: full
          push: true
          build-args: |
            NODE_VERSION=${{ env.NODE_VERSION }}
            GHOST_BUILD_VERSION=${{ env.GHOST_BUILD_VERSION }}
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2 and health check
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout deployment files
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Configure SSH
        env:
          # Paste the complete .pem file contents into this GitHub secret.
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
        run: |
          : "${EC2_HOST:?Set the EC2_HOST repository variable}"
          : "${EC2_SSH_PRIVATE_KEY:?Set the EC2_SSH_PRIVATE_KEY repository secret}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$EC2_HOST" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          {
            echo 'Host *'
            echo '  IdentityFile ~/.ssh/deploy_key'
            echo '  IdentitiesOnly yes'
            echo '  BatchMode yes'
            echo '  StrictHostKeyChecking yes'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Create protected production environment file
        env:
          IMAGE_REPOSITORY: ${{ needs.build.outputs.image }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
          EC2_HOST: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
          GHOST_URL: ${{ vars.GHOST_URL }}
        run: |
          umask 077
          if [ -z "$GHOST_URL" ]; then
            GHOST_URL="http://${EC2_HOST}"
          fi
          {
            printf 'IMAGE_REPOSITORY=%s\n' "$IMAGE_REPOSITORY"
            printf 'IMAGE_TAG=%s\n' "$IMAGE_TAG"
            printf 'GHOST_URL=%s\n' "$GHOST_URL"
            printf 'GHOST_PORT=80\n'
            printf 'MONITORING_BIND_ADDRESS=127.0.0.1\n'
            printf 'PROMETHEUS_RETENTION=15d\n'
          } > production.env

      - name: Bootstrap EC2 and upload deployment bundle
        env:
          EC2_HOST: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" 'bash -s' < scripts/deploy/bootstrap-ec2.sh
          tar czf deployment.tgz compose.production.yaml monitoring
          scp deployment.tgz production.env "$EC2_USER@$EC2_HOST:/tmp/"
          ssh "$EC2_USER@$EC2_HOST" 'set -e; umask 077; tar xzf /tmp/deployment.tgz -C /opt/ghost; find /opt/ghost/monitoring -type d -exec chmod 755 {} +; find /opt/ghost/monitoring -type f -exec chmod 644 {} +; if [ -f /opt/ghost/.env ]; then grep -vE "^(IMAGE_REPOSITORY|IMAGE_TAG|GHOST_URL|GHOST_PORT|MONITORING_BIND_ADDRESS|PROMETHEUS_RETENTION)=" /opt/ghost/.env > /tmp/merged.env || true; else printf "MYSQL_ROOT_PASSWORD=%s\nMYSQL_PASSWORD=%s\nGRAFANA_ADMIN_PASSWORD=%s\n" "$(openssl rand -hex 32)" "$(openssl rand -hex 32)" "$(openssl rand -hex 32)" > /tmp/merged.env; fi; sed -n "/^MYSQL_ROOT_PASSWORD=/p;/^MYSQL_PASSWORD=/p;/^GRAFANA_ADMIN_PASSWORD=/p" /tmp/merged.env | grep -q .; cat /tmp/production.env >> /tmp/merged.env; install -m 600 /tmp/merged.env /opt/ghost/.env; rm -f /tmp/deployment.tgz /tmp/production.env /tmp/merged.env'

      - name: Pull and deploy
        env:
          EC2_HOST: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          printf '%s' "$GHCR_TOKEN" | ssh "$EC2_USER@$EC2_HOST" "docker login ghcr.io -u '$GHCR_USERNAME' --password-stdin"
          ssh "$EC2_USER@$EC2_HOST" 'cd /opt/ghost && docker compose -f compose.production.yaml pull && docker compose -f compose.production.yaml up -d --remove-orphans && docker image prune -f'

      - name: Health check
        env:
          EC2_HOST: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER || 'ubuntu' }}
        run: |
          ssh "$EC2_USER@$EC2_HOST" 'bash -s' <<'REMOTE'
          set -e
          cd /opt/ghost
          for attempt in $(seq 1 30); do
            ghost_status=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' ghost-production-ghost-1 2>/dev/null || true)
            running_services=$(docker compose -f compose.production.yaml ps --status running --services | wc -l)
            if [ "$ghost_status" = healthy ] && [ "$running_services" -eq 8 ]; then
              if curl -fsS http://127.0.0.1/ >/dev/null && curl -fsS http://127.0.0.1:9090/-/ready >/dev/null; then
                exit 0
              fi
            fi
            sleep 10
          done
          docker compose -f compose.production.yaml ps
          docker compose -f compose.production.yaml logs --tail=150
          exit 1
          REMOTE

      - name: Deployment summary
        if: always()
        env:
          GHOST_URL: ${{ vars.GHOST_URL }}
          EC2_HOST: ${{ vars.EC2_HOST || secrets.EC2_HOST }}
          IMAGE: ${{ needs.build.outputs.image }}
          IMAGE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          if [ -z "$GHOST_URL" ]; then
            GHOST_URL="http://${EC2_HOST}"
          fi
          {
            echo '## Production deployment'
            echo "- Result: **${{ job.status }}**"
            echo "- Image: \`${IMAGE}:${IMAGE_TAG}\`"
            echo "- Application: ${GHOST_URL}"
            echo '- Grafana: private on EC2 port 3000 (use an SSH tunnel)'
            echo '- Prometheus: private on EC2 port 9090 (use an SSH tunnel)'
          } >> "$GITHUB_STEP_SUMMARY"
